<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하슐랭</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home">
  <main class="home-main">
    <div class="home-hero">
      <h1 class="home-title">🌟 Hashulin Guide 🌟</h1>
    </div>

    <div class="whoami-pick">
      <button class="whoami-btn" data-who="하진">🐱 하진</button>
      <button class="whoami-btn" data-who="민혁">🍙 민혁</button>
    </div>

    <nav class="home-menu">
      <a class="home-link-btn" href="/map.html">🍜 맛집 지도</a>
      <a class="home-link-btn" href="/wish.html">🎫 소원권 대장</a>
    </nav>

    <section class="home-cal">
      <div class="home-cal-head">
        <span>📅 다가오는 일정</span>
        <a href="/calendar.html">전체보기 ›</a>
      </div>
      <div id="homeUpcoming" class="home-cal-list">
        <div class="hc-empty">불러오는 중…</div>
      </div>
    </section>

    <section class="home-photos">
      <div class="home-cal-head"><span>📷 우리 사진</span></div>
      <div id="coupleGallery" class="couple-gallery"></div>
    </section>
  </main>

  <script>
    const KEY = 'whoami';
    const OWNER_COLOR = { 민혁: '#3182F6', 하진: '#E64980', 데이트: '#7C5CFC' };
    const btns = document.querySelectorAll('.whoami-btn');
    function paint() {
      const me = localStorage.getItem(KEY) || '';
      btns.forEach((b) => b.classList.toggle('on', b.dataset.who === me));
    }
    btns.forEach((b) =>
      b.addEventListener('click', () => { localStorage.setItem(KEY, b.dataset.who); paint(); })
    );
    // 신원 선택 전에는 지도/소원권 진입 막기
    document.querySelectorAll('.home-link-btn').forEach((a) =>
      a.addEventListener('click', (e) => {
        if (!localStorage.getItem(KEY)) {
          e.preventDefault();
          const pick = document.querySelector('.whoami-pick');
          pick.classList.add('shake');
          setTimeout(() => pick.classList.remove('shake'), 500);
        }
      })
    );
    paint();

    function escapeHtml(s = '') {
      return s.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }
    async function loadUpcoming() {
      const box = document.getElementById('homeUpcoming');
      try {
        const evs = await fetch('/api/events').then((r) => r.json());
        const t = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        const ymd = (dt) => `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}`;
        const today = ymd(t);
        const limit = ymd(new Date(t.getFullYear(), t.getMonth() + 1, t.getDate())); // 한 달 뒤
        // 오늘 ~ 한 달 이내 시작하는 일정만 (날짜순)
        const list = (Array.isArray(evs) ? evs : []).filter((e) => e.event_date >= today && e.event_date <= limit);
        const up = list.slice(0, 3);
        if (!up.length) { box.innerHTML = '<div class="hc-empty">한 달 이내 일정이 없어요</div>'; return; }
        box.innerHTML = up.map((e) => {
          const [y, m, d] = e.event_date.split('-').map(Number);
          const wd = ['일', '월', '화', '수', '목', '금', '토'][new Date(y, m - 1, d).getDay()];
          return `<a class="hc-item" href="/calendar.html">
            <i class="dot" style="background:${OWNER_COLOR[e.owner]}"></i>
            <span class="hc-date">${m}.${d}<small>(${wd})</small></span>
            <span class="hc-title">${escapeHtml(e.title)}</span>
            <span class="hc-owner" style="color:${OWNER_COLOR[e.owner]}">${e.owner}</span>
          </a>`;
        }).join('') + (list.length > 3 ? `<a class="hc-more" href="/calendar.html">+${list.length - 3}개 더 보기 ›</a>` : '');
      } catch (_) { box.innerHTML = '<div class="hc-empty">일정을 불러오지 못했어요</div>'; }
    }
    loadUpcoming();

    // ── 우리 사진 (커플 갤러리) ──────────────────────────────
    function resizeImage(file, maxDim = 1280, q = 0.82) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const s = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.round(img.width * s), h = Math.round(img.height * s);
          const c = document.createElement('canvas'); c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          c.toBlob((b) => resolve(b || file), 'image/jpeg', q);
        };
        img.onerror = () => resolve(file);
        img.src = URL.createObjectURL(file);
      });
    }
    async function loadCouple() {
      const box = document.getElementById('coupleGallery');
      let photos = [];
      try { photos = await fetch('/api/couple-photos').then((r) => r.json()); } catch (_) {}
      if (!Array.isArray(photos)) photos = [];
      box.innerHTML = photos.map((ph) =>
        `<div class="cp-tile"><img src="${ph.url}" /><button class="cp-del" data-id="${ph.id}">✕</button></div>`
      ).join('') + '<label class="cp-add">＋<input id="cpInput" type="file" accept="image/*" hidden /></label>';

      const inp = document.getElementById('cpInput');
      if (inp) inp.addEventListener('change', async (e) => {
        const f = e.target.files[0]; if (!f) return;
        const blob = await resizeImage(f);
        const fd = new FormData(); fd.append('photo', blob, 'photo.jpg');
        const res = await fetch('/api/couple-photos', { method: 'POST', body: fd });
        if (!res.ok) { alert('업로드 실패'); return; }
        loadCouple();
      });
      box.querySelectorAll('.cp-tile img').forEach((im) => im.addEventListener('click', () => window.open(im.src, '_blank')));
      box.querySelectorAll('.cp-del').forEach((b) => b.addEventListener('click', async () => {
        if (!confirm('이 사진을 삭제할까요?')) return;
        await fetch(`/api/couple-photos/${b.dataset.id}`, { method: 'DELETE' });
        loadCouple();
      }));
    }
    loadCouple();
  </script>
</body>
</html>
