<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하슐랭 — 맛집 지도</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <a href="/" class="home-link">←</a>
      <h1>Hachelin Guide</h1>
    </div>
    <div class="bar-right">
      <button id="statsBtn" class="icon-btn" title="리뷰 모아보기" aria-label="리뷰 모아보기">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <a href="/" class="me-chip" id="meChip" title="바꾸려면 홈으로">–</a>
    </div>
  </header>

  <main class="map-layout">
    <section class="sidebar">
      <div class="sheet-handle"></div>
      <div class="search">
        <input id="searchInput" type="text" placeholder="가게 이름 검색 (예: 성수 파스타)" />
        <button id="searchBtn">검색</button>
      </div>
      <div id="searchResults" class="results"></div>

      <div class="list-head">
        <h2>📌 저장된 가게</h2>
        <div class="sort-toggle">
          <button class="sort-btn on" data-sort="recent">최신순</button>
          <button class="sort-btn" data-sort="score">평점순</button>
        </div>
      </div>
      <div class="status-filter">
        <button class="stf-btn on" data-st="전체">전체</button>
        <button class="stf-btn" data-st="방문">방문</button>
        <button class="stf-btn" data-st="위시">❤️ 위시</button>
      </div>
      <div id="placeList" class="results"></div>
    </section>

    <section id="map" class="map"></section>
  </main>

  <!-- 가게 상세/평가 패널 -->
  <div id="panel" class="panel hidden">
    <button id="panelClose" class="close">✕</button>
    <div id="panelBody"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- 지도 스크립트는 /api/config 로 받은 Client ID로 동적 로드 -->
  <script src="app.js"></script>
</body>
</html>
