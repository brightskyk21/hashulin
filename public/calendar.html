<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>우리 일정</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="wish-body">
  <header class="app-bar cal-bar">
    <div class="brand">
      <a href="/" class="home-link">←</a>
      <h1>📅 우리 일정</h1>
    </div>
    <button id="addBtn" class="drawer-btn" aria-label="일정 추가">＋</button>
  </header>

  <main class="cal-main">
    <div class="cal-nav">
      <button id="prevM" class="cal-arrow">‹</button>
      <span id="calLabel" class="cal-label">—</span>
      <button id="nextM" class="cal-arrow">›</button>
    </div>

    <div class="cal-weekdays">
      <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
    </div>
    <div id="calGrid" class="cal-grid"></div>

    <div class="cal-legend">
      <span><i class="dot" style="background:#3182F6"></i>민혁</span>
      <span><i class="dot" style="background:#E64980"></i>하진</span>
      <span><i class="dot" style="background:#7C5CFC"></i>데이트</span>
    </div>

    <div id="dayPanel" class="day-panel"></div>
  </main>

  <!-- 일정 추가 모달 -->
  <div id="addModal" class="modal hidden">
    <div class="sheet">
      <div class="sheet-head"><span>📅 일정 추가</span><button class="sheet-close" data-close>✕</button></div>
      <label class="f-label">누구 일정</label>
      <div class="owner-pick" id="ownerPick">
        <button class="owner-btn" data-owner="민혁">민혁</button>
        <button class="owner-btn" data-owner="하진">하진</button>
        <button class="owner-btn" data-owner="데이트">데이트</button>
      </div>
      <label class="f-label">날짜</label>
      <input id="evDate" type="date" />
      <label class="f-label">시간 (선택)</label>
      <input id="evTime" type="time" />
      <label class="f-label">내용</label>
      <input id="evTitle" type="text" placeholder="예: 저녁 데이트 🍝" />
      <label class="f-label">메모 (선택)</label>
      <textarea id="evMemo" rows="2" placeholder="장소, 준비물 등"></textarea>
      <button id="saveEvent" class="big-btn primary">저장</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="calendar.js"></script>
</body>
</html>
